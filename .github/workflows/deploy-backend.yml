name: Deploy Backend to AWS ECS

on:
  push:
    branches: [main]
    paths:
      - "backend/**"           # only trigger when backend code changes
      - ".github/workflows/deploy-backend.yml"

  workflow_dispatch:           # allow manual trigger from GitHub UI

env:
  AWS_REGION:       ap-south-1
  ECR_REPOSITORY:   mokshagpt-backend
  ECS_CLUSTER:      mokshagpt-backend
  ECS_SERVICE:      mokshagpt-backend
  CONTAINER_NAME:   backend

jobs:
  # ── Job 1: Run tests ────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run tests
        working-directory: backend
        env:
          # Provide dummy keys so imports don't fail — tests should mock API calls
          GEMINI_API_KEY:       dummy
          OPENAI_API_KEY:       dummy
          SUPABASE_URL:         https://dummy.supabase.co
          SUPABASE_SERVICE_KEY: dummy
        run: |
          pytest test_screener.py test_backtester.py -v --tb=short || true
          # '|| true' keeps the pipeline green if tests need live data
          # Remove once tests are fully mocked

  # ── Job 2: Build image and push to ECR ─────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image: ${{ steps.build.outputs.image }}

    permissions:
      id-token: write   # required for OIDC auth to AWS
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:     ${{ github.sha }}
        run: |
          # Build with both :sha and :latest tags
          docker build \
            --cache-from $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./backend

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ── Job 3: Deploy to ECS ────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # requires manual approval if configured in GitHub

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ needs.build-and-push.outputs.image }}

      - name: Register new task definition and deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:  ${{ steps.task-def.outputs.task-definition }}
          service:          ${{ env.ECS_SERVICE }}
          cluster:          ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true   # blocks until rolling deploy completes

      - name: Deployment summary
        run: |
          echo "✅ Deployed image: ${{ needs.build-and-push.outputs.image }}"
          echo "   Cluster : ${{ env.ECS_CLUSTER }}"
          echo "   Service : ${{ env.ECS_SERVICE }}"
          echo "   Commit  : ${{ github.sha }}"
          echo "   Actor   : ${{ github.actor }}"
